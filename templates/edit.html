<!DOCTYPE html>
<html>

<head>
    <title>Edit Expense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="container">

    <div class="card form-card">

        <h2>✏️ Edit Expense</h2>

        <form method="POST" class="form">

            <!-- Amount -->
            <div class="form-group">
                <label>Amount</label>
                <input type="number" name="amount"
                       value="{{ expense['amount'] }}"
                       min="1" step="0.01" required>
            </div>

            <!-- Category -->
            <div class="form-group">
                <label>Category</label>
                <select name="category" required>

                    <option value="Food" {% if expense['category'] == "Food" %}selected{% endif %}>Food</option>
                    <option value="Travel" {% if expense['category'] == "Travel" %}selected{% endif %}>Travel</option>
                    <option value="Shopping" {% if expense['category'] == "Shopping" %}selected{% endif %}>Shopping</option>
                    <option value="Bills" {% if expense['category'] == "Bills" %}selected{% endif %}>Bills</option>
                    <option value="Other" {% if expense['category'] == "Other" %}selected{% endif %}>Other</option>

                </select>
            </div>

            <!-- Date -->
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date"
                       value="{{ expense['date'] }}" required>
            </div>

            <!-- Note -->
            <div class="form-group">
                <label>Note</label>
                <input type="text" name="note"
                       value="{{ expense['note'] }}"
                       placeholder="Optional note...">
            </div>

            <!-- Buttons -->
            <div class="form-actions">
                <button type="submit" class="btn add">💾 Update</button>
                <a href="/" class="btn back">⬅ Back</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
